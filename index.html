<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新生児挿管シミュレーション</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
        }
        #start-btn {
            padding: 28px 80px;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            background: transparent;
            border: 3px solid #fff;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 4px;
            transition: background 0.2s, color 0.2s;
        }
        #start-btn:hover {
            background: rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
    <button id="start-btn">ゲームスタート</button>

    <script src="shared/js/bgm.js" data-bgm="shared/assets/soukanbgm.mp3"></script>
    <script>
        document.getElementById('start-btn').addEventListener('click', function () {
            // このクリックでブラウザの音声自動再生ブロックが解除される
            window.location.replace('cpap/index.html');
        });
    </script>
</body>
</html>
