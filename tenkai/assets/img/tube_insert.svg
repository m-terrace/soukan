<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="60" height="220" viewBox="0 0 60 220">
  <!-- ========== 気管チューブ（縦型・先端下向き）========== -->

  <!-- 上部コネクタ（15mmアダプター） -->
  <rect x="7" y="0" width="46" height="18" rx="6"
        fill="#5A82A4" stroke="#3A607E" stroke-width="1.5"/>
  <rect x="15" y="18" width="30" height="7" rx="3"
        fill="#7AAAC8" stroke="#5A82A4" stroke-width="1"/>

  <!-- チューブ本体 -->
  <rect x="22" y="25" width="16" height="143" rx="8"
        fill="#A8D8EE" stroke="#5A9EC2" stroke-width="1.5"/>

  <!-- 深さマーキング -->
  <line x1="30" y1="48"  x2="38" y2="48"  stroke="#4A8EB2" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="65"  x2="38" y2="65"  stroke="#4A8EB2" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="82"  x2="38" y2="82"  stroke="#4A8EB2" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="99"  x2="38" y2="99"  stroke="#4A8EB2" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="116" x2="38" y2="116" stroke="#4A8EB2" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="133" x2="38" y2="133" stroke="#4A8EB2" stroke-width="1" opacity="0.7"/>

  <!-- パイロットバルーンライン -->
  <path d="M 38 95 C 50 93 52 85 52 80"
        stroke="#5A9EC2" stroke-width="1.5" fill="none"/>
  <!-- パイロットバルーン -->
  <ellipse cx="52" cy="74" rx="7" ry="9"
           fill="#C5E8F5" stroke="#5A9EC2" stroke-width="1.5"/>

  <!-- カフ（先端付近の膨張バルーン） -->
  <ellipse cx="30" cy="184" rx="21" ry="13"
           fill="#BDE5F8" stroke="#5A9EC2" stroke-width="1.5" opacity="0.88"/>

  <!-- 先端部（カフより下） -->
  <rect x="22" y="168" width="16" height="36" rx="8"
        fill="#A8D8EE" stroke="#5A9EC2" stroke-width="1.5"/>

  <!-- マーフィーアイ（側孔） -->
  <ellipse cx="24" cy="172" rx="3.5" ry="4.5"
           fill="white" stroke="#5A9EC2" stroke-width="1" opacity="0.85"/>

  <!-- 斜カット先端 -->
  <path d="M 22 196 Q 30 214 38 196"
        fill="#A8D8EE" stroke="#5A9EC2" stroke-width="1.5"/>
</svg>
